<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A tactile motion website centered on an animated teapot."
    />
    <title>Teapot Motion</title>
  </head>
  <body>
    <div id="app">
      <main class="stage" aria-labelledby="site-title">
        <section class="intro" aria-label="Teapot motion website">
          <p class="eyebrow">Porcelain kinetic study</p>
          <h1 id="site-title">Teapot Motion</h1>
          <p class="intro-copy">
            Tilt, pour, and settle a small ceramic scene built for the browser.
          </p>
        </section>

        <section class="scene-panel" aria-label="Animated teapot scene">
          <p id="scene-loading" class="loading">Warming the kettle</p>
          <canvas
            id="teapot-canvas"
            aria-label="Animated porcelain teapot with steam and pouring motion"
          ></canvas>
          <div id="fallback-teapot" class="fallback-teapot" hidden aria-hidden="true">
            <span class="fallback-lid"></span>
            <span class="fallback-body"></span>
            <span class="fallback-spout"></span>
            <span class="fallback-handle"></span>
            <span class="fallback-steam steam-one"></span>
            <span class="fallback-steam steam-two"></span>
          </div>
          <p id="fallback-note" class="fallback-note" hidden>
            3D scene unavailable. Static teapot shown.
          </p>
        </section>

        <section class="controls" aria-label="Teapot controls">
          <button type="button" data-mode="pouring" data-testid="pour-button">
            Pour
          </button>
          <button type="button" data-mode="steam" data-testid="steam-button">
            Steam
          </button>
          <button type="button" data-mode="still" data-testid="still-button">
            Still
          </button>
        </section>

        <aside class="readout" aria-label="Scene state">
          <span>Scene</span>
          <strong id="mode-readout" data-testid="mode-readout" aria-live="polite">
            warming
          </strong>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
